<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showcasing My Work</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .hero_section {
            position: relative;
            padding: 100px 12px;
            background-color: #001219;
            text-align: center;
        }

        .hero_section h1 {
            font-size: 50px;
            font-weight: 600;
            line-height: 1.4;
            color: #e9d8a6;
        }

        .hero_section h1>span {
            color: #e9d8a6;
        }

        .hero_section p {
            font-size: 28px;
            font-weight: 500;
            line-height: 1.6;
            color: #e9d8a6;
        }
    </style>
</head>

<body>
    <section class="hero_section">
        <h1>Kaushal <span>Arya</span></h1>
        <P>Web Designer & WordPress Developer</P>
    </section>
</body>

</html>
